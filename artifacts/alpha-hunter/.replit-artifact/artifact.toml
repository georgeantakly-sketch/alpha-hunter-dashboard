kind = "web"
previewPath = "/"
title = "Alpha Hunter Dashboard"
version = "1.0.0"
id = "artifacts/alpha-hunter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21653

[services.development]
run = "pnpm --filter @workspace/alpha-hunter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alpha-hunter", "run", "build" ]
publicDir = "artifacts/alpha-hunter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21653"
BASE_PATH = "/"
